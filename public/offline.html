<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena Messenger — Нет подключения</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b1220;
      color: #eef4ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .container {
      max-width: 420px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      opacity: 0.8;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      color: #8ea0bf;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 28px;
    }
    .retry-btn {
      display: inline-block;
      padding: 12px 32px;
      background: #4da3ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #2f81f7; }
    .retry-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📶</div>
    <h1>Нет подключения к сети</h1>
    <p>Проверьте интернет-соединение и попробуйте снова. Arena Messenger вернётся, как только сеть станет доступна.</p>
    <button class="retry-btn" onclick="window.location.reload()">Попробовать снова</button>
  </div>
  <script>
    // Автоматически перезагружаем, когда сеть появится
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
